version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eloktantra
    ports:
      - "5432:5432"

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "4001:4001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eloktantra
      - JWT_SECRET=dev-secret-key
    depends_on:
      - db

  candidate-service:
    build:
      context: ./services/candidate-service
    ports:
      - "4002:4002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eloktantra
    depends_on:
      - db

  issue-reporting-service:
    build:
      context: ./services/issue-reporting-service
    ports:
      - "4004:4004"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eloktantra
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AUTH_API_URL=http://auth-service:4001
      - NEXT_PUBLIC_CANDIDATE_API_URL=http://candidate-service:4002
      - NEXT_PUBLIC_ISSUE_API_URL=http://issue-reporting-service:4004
    depends_on:
      - auth-service
      - candidate-service
      - issue-reporting-service
